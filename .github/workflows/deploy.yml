name: Deploy Matrix

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      mode:
        description: "Deploy mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - bootstrap
          - setup
          - start

env:
  SSH_PORT: 2222
  DEPLOY_USER: root
  HOST: ${{ vars.HOST }}
  PLAYBOOK_PATH: /root/matrix-docker-ansible-deploy
  DEPLOY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'full' }}

  MATRIX_PLAYBOOK_MIGRATION_VALIDATED_VERSION: ${{ vars.MATRIX_PLAYBOOK_MIGRATION_VALIDATED_VERSION }}
  MATRIX_DOMAIN: ${{ vars.MATRIX_DOMAIN }}
  MATRIX_HOMESERVER_GENERIC_SECRET_KEY: ${{ secrets.MATRIX_HOMESERVER_GENERIC_SECRET_KEY }}
  MATRIX_MAUTRIX_TELEGRAM_ENABLED: ${{ vars.MATRIX_MAUTRIX_TELEGRAM_ENABLED || 'false' }}
  MATRIX_MAUTRIX_TELEGRAM_API_ID: ${{ vars.MATRIX_MAUTRIX_TELEGRAM_API_ID || '' }}
  MATRIX_MAUTRIX_TELEGRAM_API_HASH: ${{ secrets.MATRIX_MAUTRIX_TELEGRAM_API_HASH || '' }}
  MATRIX_MAUTRIX_DISCORD_ENABLED: ${{ vars.MATRIX_MAUTRIX_DISCORD_ENABLED || 'false' }}
  POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
  POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
  POSTGRES_USER: ${{ vars.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DATABASE: ${{ vars.POSTGRES_DATABASE }}

jobs:
  bootstrap:
    if: env.DEPLOY_MODE == 'bootstrap'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render deploy files
        run: |
          set -eu
          export TEMPLATE_PATH=./inventory/hosts.template
          export OUTPUT_PATH=./rendered/inventory/hosts
          sh ./scripts/render-template.sh

          export TEMPLATE_PATH=./inventory/host_vars/matrix.nu31.space/vars.yml.template
          export OUTPUT_PATH=./rendered/inventory/host_vars/matrix.nu31.space/vars.yml
          sh ./scripts/render-template.sh

      - name: Configure SSH key
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ROOT_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update playbook checkout
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "test -d ${PLAYBOOK_PATH}/.git || git clone https://github.com/spantaleev/matrix-docker-ansible-deploy.git ${PLAYBOOK_PATH}"
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && git pull --ff-only"

      - name: Install Ansible roles
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && rm -rf roles/galaxy && ansible-galaxy install -r requirements.yml -p roles/galaxy/ --force"

      - name: Ensure Docker is running
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "systemctl reset-failed docker.socket docker.service && systemctl restart docker.socket && systemctl restart docker.service && systemctl is-active docker.socket docker.service"

  setup:
    if: env.DEPLOY_MODE == 'setup'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render deploy files
        run: |
          set -eu
          export TEMPLATE_PATH=./inventory/hosts.template
          export OUTPUT_PATH=./rendered/inventory/hosts
          sh ./scripts/render-template.sh

          export TEMPLATE_PATH=./inventory/host_vars/matrix.nu31.space/vars.yml.template
          export OUTPUT_PATH=./rendered/inventory/host_vars/matrix.nu31.space/vars.yml
          sh ./scripts/render-template.sh

      - name: Configure SSH key
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ROOT_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update playbook checkout
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "test -d ${PLAYBOOK_PATH}/.git || git clone https://github.com/spantaleev/matrix-docker-ansible-deploy.git ${PLAYBOOK_PATH}"
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && git pull --ff-only"

      - name: Install Ansible roles
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && rm -rf roles/galaxy && ansible-galaxy install -r requirements.yml -p roles/galaxy/ --force"

      - name: Ensure Docker is running
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "systemctl reset-failed docker.socket docker.service && systemctl restart docker.socket && systemctl restart docker.service && systemctl is-active docker.socket docker.service"

      - name: Upload deploy files
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "mkdir -p ${PLAYBOOK_PATH}/inventory/host_vars/matrix.nu31.space"
          scp -P "${SSH_PORT}" rendered/inventory/hosts "${DEPLOY_USER}@${HOST}:${PLAYBOOK_PATH}/inventory/hosts"
          scp -P "${SSH_PORT}" rendered/inventory/host_vars/matrix.nu31.space/vars.yml "${DEPLOY_USER}@${HOST}:${PLAYBOOK_PATH}/inventory/host_vars/matrix.nu31.space/vars.yml"

      - name: Run setup playbook
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && ansible-playbook -i inventory/hosts setup.yml --tags=setup-all"

  start:
    if: env.DEPLOY_MODE == 'start'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render deploy files
        run: |
          set -eu
          export TEMPLATE_PATH=./inventory/hosts.template
          export OUTPUT_PATH=./rendered/inventory/hosts
          sh ./scripts/render-template.sh

          export TEMPLATE_PATH=./inventory/host_vars/matrix.nu31.space/vars.yml.template
          export OUTPUT_PATH=./rendered/inventory/host_vars/matrix.nu31.space/vars.yml
          sh ./scripts/render-template.sh

      - name: Configure SSH key
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ROOT_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update playbook checkout
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "test -d ${PLAYBOOK_PATH}/.git || git clone https://github.com/spantaleev/matrix-docker-ansible-deploy.git ${PLAYBOOK_PATH}"
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && git pull --ff-only"

      - name: Install Ansible roles
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && rm -rf roles/galaxy && ansible-galaxy install -r requirements.yml -p roles/galaxy/ --force"

      - name: Ensure Docker is running
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "systemctl reset-failed docker.socket docker.service && systemctl restart docker.socket && systemctl restart docker.service && systemctl is-active docker.socket docker.service"

      - name: Upload deploy files
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "mkdir -p ${PLAYBOOK_PATH}/inventory/host_vars/matrix.nu31.space"
          scp -P "${SSH_PORT}" rendered/inventory/hosts "${DEPLOY_USER}@${HOST}:${PLAYBOOK_PATH}/inventory/hosts"
          scp -P "${SSH_PORT}" rendered/inventory/host_vars/matrix.nu31.space/vars.yml "${DEPLOY_USER}@${HOST}:${PLAYBOOK_PATH}/inventory/host_vars/matrix.nu31.space/vars.yml"

      - name: Run start playbook
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && ansible-playbook -i inventory/hosts setup.yml --tags=start-all"

  full:
    if: env.DEPLOY_MODE == 'full'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render deploy files
        run: |
          set -eu
          export TEMPLATE_PATH=./inventory/hosts.template
          export OUTPUT_PATH=./rendered/inventory/hosts
          sh ./scripts/render-template.sh

          export TEMPLATE_PATH=./inventory/host_vars/matrix.nu31.space/vars.yml.template
          export OUTPUT_PATH=./rendered/inventory/host_vars/matrix.nu31.space/vars.yml
          sh ./scripts/render-template.sh

      - name: Configure SSH key
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ROOT_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update playbook checkout
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "test -d ${PLAYBOOK_PATH}/.git || git clone https://github.com/spantaleev/matrix-docker-ansible-deploy.git ${PLAYBOOK_PATH}"
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && git pull --ff-only"

      - name: Install Ansible roles
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && rm -rf roles/galaxy && ansible-galaxy install -r requirements.yml -p roles/galaxy/ --force"

      - name: Ensure Docker is running
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "systemctl reset-failed docker.socket docker.service && systemctl restart docker.socket && systemctl restart docker.service && systemctl is-active docker.socket docker.service"

      - name: Upload deploy files
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "mkdir -p ${PLAYBOOK_PATH}/inventory/host_vars/matrix.nu31.space"
          scp -P "${SSH_PORT}" rendered/inventory/hosts "${DEPLOY_USER}@${HOST}:${PLAYBOOK_PATH}/inventory/hosts"
          scp -P "${SSH_PORT}" rendered/inventory/host_vars/matrix.nu31.space/vars.yml "${DEPLOY_USER}@${HOST}:${PLAYBOOK_PATH}/inventory/host_vars/matrix.nu31.space/vars.yml"

      - name: Run setup playbook
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && ansible-playbook -i inventory/hosts setup.yml --tags=setup-all"

      - name: Run start playbook
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "cd ${PLAYBOOK_PATH} && ansible-playbook -i inventory/hosts setup.yml --tags=start-all"
